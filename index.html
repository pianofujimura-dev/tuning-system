<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>調律顧客管理システム</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tabs button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #ddd;
      cursor: pointer;
      font-size: 16px;
    }

    .tabs button.active {
      background: #2f80ed;
      color: white;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 15px;
    }

    textarea {
      height: 80px;
    }

    .date-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 5px;
    }

    .date-row select {
      flex: 1;
    }

    .date-row span {
      white-space: nowrap;
    }

    .hidden {
      display: none;
    }

    .save-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      cursor: pointer;
    }

    .customer-list {
      margin-top: 30px;
    }

    .customer-card {
      background: #f9f9f9;
      padding: 12px;
      margin-top: 10px;
      border-left: 5px solid #2f80ed;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>調律顧客管理システム</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="setCustomerType('顧客登録')">顧客登録</button>
    <button class="tab-btn" onclick="setCustomerType('リメイク顧客')">リメイク顧客</button>
    <button class="tab-btn" onclick="setCustomerType('中古購入顧客')">中古購入顧客</button>
  </div>

  <form id="customerForm">
    <input type="hidden" id="customerType" value="顧客登録">

    <label>お客様名</label>
    <input type="text" id="customerName">

    <label>電話番号</label>
    <input type="text" id="phone">

    <label>住所</label>
    <input type="text" id="address">

    <label>ピアノ情報</label>
    <input type="text" id="pianoInfo" placeholder="例：ヤマハ U3H">

    <label>最終調律日</label>
    <div class="date-row">
      <select id="lastTuneYear"></select><span>年</span>
      <select id="lastTuneMonth"></select><span>月</span>
      <select id="lastTuneDay"></select><span>日</span>
    </div>

    <label>次回案内予定日</label>
    <div class="date-row">
      <select id="nextGuideYear"></select><span>年</span>
      <select id="nextGuideMonth"></select><span>月</span>
      <select id="nextGuideDay"></select><span>日</span>
    </div>

    <div id="remakeFields" class="hidden">
      <label>納品日</label>
      <div class="date-row">
        <select id="deliveryYear"></select><span>年</span>
        <select id="deliveryMonth"></select><span>月</span>
        <select id="deliveryDay"></select><span>日</span>
      </div>

      <label>納調予定日</label>
      <div class="date-row">
        <select id="afterDeliveryTuneYear"></select><span>年</span>
        <select id="afterDeliveryTuneMonth"></select><span>月</span>
        <select id="afterDeliveryTuneDay"></select><span>日</span>
      </div>
    </div>

    <label>メモ</label>
    <textarea id="memo"></textarea>

    <button type="submit" class="save-btn">保存する</button>
  </form>

  <div class="customer-list">
    <h2>登録済み顧客</h2>
    <div id="customerList"></div>
  </div>
</div>

<script>
  let customers = JSON.parse(localStorage.getItem("customers")) || [];

  function setCustomerType(type) {
    document.getElementById("customerType").value = type;

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.classList.remove("active");
      if (btn.textContent === type) {
        btn.classList.add("active");
      }
    });

    const remakeFields = document.getElementById("remakeFields");

    if (type === "リメイク顧客" || type === "中古購入顧客") {
      remakeFields.classList.remove("hidden");
    } else {
      remakeFields.classList.add("hidden");
    }
  }

  function setupDateSelect(yearId, monthId, dayId) {
    const yearSelect = document.getElementById(yearId);
    const monthSelect = document.getElementById(monthId);
    const daySelect = document.getElementById(dayId);

    const currentYear = new Date().getFullYear();

    yearSelect.innerHTML = '<option value="">年</option>';
    for (let y = currentYear - 10; y <= currentYear + 10; y++) {
      yearSelect.innerHTML += `<option value="${y}">${y}</option>`;
    }

    monthSelect.innerHTML = '<option value="">月</option>';
    for (let m = 1; m <= 12; m++) {
      monthSelect.innerHTML += `<option value="${m}">${m}</option>`;
    }

    daySelect.innerHTML = '<option value="">日</option>';

    function updateDays() {
      const selectedDay = daySelect.value;
      const year = Number(yearSelect.value);
      const month = Number(monthSelect.value);

      daySelect.innerHTML = '<option value="">日</option>';

      if (!year || !month) return;

      const daysInMonth = new Date(year, month, 0).getDate();

      for (let d = 1; d <= daysInMonth; d++) {
        daySelect.innerHTML += `<option value="${d}">${d}</option>`;
      }

      if (selectedDay && selectedDay <= daysInMonth) {
        daySelect.value = selectedDay;
      }
    }

    yearSelect.addEventListener("change", updateDays);
    monthSelect.addEventListener("change", updateDays);
  }

  function getSelectedDate(yearId, monthId, dayId) {
    const y = document.getElementById(yearId).value;
    const m = document.getElementById(monthId).value;
    const d = document.getElementById(dayId).value;

    if (!y || !m || !d) return "";

    return `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
  }

  function clearDateSelect(yearId, monthId, dayId) {
    document.getElementById(yearId).value = "";
    document.getElementById(monthId).value = "";
    document.getElementById(dayId).innerHTML = '<option value="">日</option>';
  }

  function setDateSelect(yearId, monthId, dayId, dateString) {
    if (!dateString) return;

    const [y, m, d] = dateString.split("-");

    document.getElementById(yearId).value = y;
    document.getElementById(monthId).value = Number(m);

    document.getElementById(monthId).dispatchEvent(new Event("change"));

    document.getElementById(dayId).value = Number(d);
  }

  function addOneYear(dateString) {
    if (!dateString) return "";

    const date = new Date(dateString);
    date.setFullYear(date.getFullYear() + 1);

    return date.toISOString().split("T")[0];
  }

  function addSixMonths(dateString) {
    if (!dateString) return "";

    const date = new Date(dateString);
    date.setMonth(date.getMonth() + 6);

    return date.toISOString().split("T")[0];
  }

  function renderCustomers() {
    const list = document.getElementById("customerList");
    list.innerHTML = "";

    customers.forEach(customer => {
      const div = document.createElement("div");
      div.className = "customer-card";

      div.innerHTML = `
        <strong>${customer.name}</strong><br>
        区分：${customer.type}<br>
        電話：${customer.phone}<br>
        住所：${customer.address}<br>
        ピアノ：${customer.pianoInfo}<br>
        最終調律日：${customer.lastTuneDate || "未入力"}<br>
        次回案内予定日：${customer.nextGuideDate || "未入力"}<br>
        納品日：${customer.deliveryDate || "未入力"}<br>
        納調予定日：${customer.afterDeliveryTuneDate || "未入力"}<br>
        メモ：${customer.memo || ""}
      `;

      list.appendChild(div);
    });
  }

  setupDateSelect("lastTuneYear", "lastTuneMonth", "lastTuneDay");
  setupDateSelect("nextGuideYear", "nextGuideMonth", "nextGuideDay");
  setupDateSelect("deliveryYear", "deliveryMonth", "deliveryDay");
  setupDateSelect("afterDeliveryTuneYear", "afterDeliveryTuneMonth", "afterDeliveryTuneDay");

  document.getElementById("lastTuneYear").addEventListener("change", autoSetNextGuide);
  document.getElementById("lastTuneMonth").addEventListener("change", autoSetNextGuide);
  document.getElementById("lastTuneDay").addEventListener("change", autoSetNextGuide);

  function autoSetNextGuide() {
    const lastTuneDate = getSelectedDate(
      "lastTuneYear",
      "lastTuneMonth",
      "lastTuneDay"
    );

    if (!lastTuneDate) return;

    const nextDate = addOneYear(lastTuneDate);

    setDateSelect(
      "nextGuideYear",
      "nextGuideMonth",
      "nextGuideDay",
      nextDate
    );
  }

  document.getElementById("deliveryYear").addEventListener("change", autoSetAfterDeliveryTune);
  document.getElementById("deliveryMonth").addEventListener("change", autoSetAfterDeliveryTune);
  document.getElementById("deliveryDay").addEventListener("change", autoSetAfterDeliveryTune);

  function autoSetAfterDeliveryTune() {
    const deliveryDate = getSelectedDate(
      "deliveryYear",
      "deliveryMonth",
      "deliveryDay"
    );

    if (!deliveryDate) return;

    const afterTuneDate = addSixMonths(deliveryDate);

    setDateSelect(
      "afterDeliveryTuneYear",
      "afterDeliveryTuneMonth",
      "afterDeliveryTuneDay",
      afterTuneDate
    );
  }

  document.getElementById("customerForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const customer = {
      type: document.getElementById("customerType").value,
      name: document.getElementById("customerName").value,
      phone: document.getElementById("phone").value,
      address: document.getElementById("address").value,
      pianoInfo: document.getElementById("pianoInfo").value,

      lastTuneDate: getSelectedDate(
        "lastTuneYear",
        "lastTuneMonth",
        "lastTuneDay"
      ),

      nextGuideDate: getSelectedDate(
        "nextGuideYear",
        "nextGuideMonth",
        "nextGuideDay"
      ),

      deliveryDate: getSelectedDate(
        "deliveryYear",
        "deliveryMonth",
        "deliveryDay"
      ),

      afterDeliveryTuneDate: getSelectedDate(
        "afterDeliveryTuneYear",
        "afterDeliveryTuneMonth",
        "afterDeliveryTuneDay"
      ),

      memo: document.getElementById("memo").value
    };

    if (!customer.name) {
      alert("お客様名を入力してください");
      return;
    }

    customers.push(customer);
    localStorage.setItem("customers", JSON.stringify(customers));

    renderCustomers();

    document.getElementById("customerForm").reset();

    clearDateSelect("lastTuneYear", "lastTuneMonth", "lastTuneDay");
    clearDateSelect("nextGuideYear", "nextGuideMonth", "nextGuideDay");
    clearDateSelect("deliveryYear", "deliveryMonth", "deliveryDay");
    clearDateSelect("afterDeliveryTuneYear", "afterDeliveryTuneMonth", "afterDeliveryTuneDay");

    setCustomerType("顧客登録");

    alert("保存しました");
  });

  renderCustomers();
</script>

</body>
</html>
